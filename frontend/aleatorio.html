<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor 11 — Aleatorio</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="stylesheet" href="/static/css/libre.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="libre-body">

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="libre-header arcade-header">
    <button class="libre-back" id="aleatBackBtn" aria-label="Terminar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <span class="arcade-title">🎲 Aleatorio</span>

    <!-- Marcador: ✓ aciertos · ✗ fallos -->
    <div class="aleat-score-wrap">
      <span class="aleat-score-ok" id="scoreOk">✓ 0</span>
      <span class="aleat-score-sep">·</span>
      <span class="aleat-score-fail" id="scoreFail">✗ 0</span>
    </div>
  </header>

  <!-- ── Barra de progreso ────────────────────────────────── -->
  <div class="progreso-barra">
    <div class="progreso-barra__fill" id="progresoBarra" style="width: 0%"></div>
  </div>

  <!-- ── Contenido principal ─────────────────────────────── -->
  <main class="pregunta-main">
    <div class="pregunta-card">
      <p class="pregunta-enunciado" id="enunciado">Cargando...</p>
    </div>
    <div class="opciones-grid" id="opcionesGrid"></div>
    <div class="pregunta-explicacion" id="explicacion" hidden></div>
  </main>

  <!-- ── Footer con Siguiente + Terminar ─────────────────── -->
  <div class="libre-footer aleat-footer">
    <button class="libre-cta" id="siguienteBtn" hidden>Siguiente →</button>
    <button class="libre-cta aleat-terminar-btn" id="terminarBtn">Terminar</button>
  </div>

  <script src="/static/js/aleatorio.js"></script>
</body>
</html>
