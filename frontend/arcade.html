<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor 11 — Arcade</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="stylesheet" href="/static/css/libre.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="libre-body arcade-page">

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="libre-header arcade-header">
    <button class="libre-back" id="arcadeBackBtn" aria-label="Volver">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <span class="arcade-title">🕹️ Arcade</span>

    <div class="arcade-score-wrap">
      <span class="arcade-score-label">Pts</span>
      <span class="arcade-score" id="arcadeScore">0</span>
    </div>
  </header>

  <!-- ── Barra de progreso (decorativa, sin fin) ─────────── -->
  <div class="progreso-barra">
    <div class="progreso-barra__fill" id="progresoBarra" style="width: 0%"></div>
  </div>

  <!-- ── Contenido principal ─────────────────────────────── -->
  <main class="pregunta-main">
    <div class="pregunta-card">
      <p class="pregunta-enunciado" id="enunciado">Cargando...</p>
    </div>
    <div class="opciones-grid" id="opcionesGrid"></div>
    <div class="pregunta-explicacion" id="explicacion" hidden></div>
  </main>

  <!-- ── Botón siguiente ─────────────────────────────────── -->
  <div class="libre-footer">
    <button class="libre-cta" id="siguienteBtn" hidden>Siguiente →</button>
  </div>

  <!-- ── Barra de vidas fija abajo ───────────────────────── -->
  <div class="arcade-lives-bar">
    <div class="arcade-lives-bar__avatar">
      <img id="arcadeAvatarImg" src="" alt="Avatar" />
    </div>
    <div class="arcade-lives" id="arcadeLives">
      <span class="arcade-heart">❤️</span>
      <span class="arcade-heart">❤️</span>
      <span class="arcade-heart">❤️</span>
    </div>
  </div>

  <!-- ── Game Over overlay ───────────────────────────────── -->
  <div class="arcade-gameover" id="arcadeGameover" hidden>
    <div class="arcade-gameover__card">
      <span class="arcade-gameover__icon">💀</span>
      <h2 class="arcade-gameover__title">¡Game Over!</h2>
      <p class="arcade-gameover__score">
        Puntaje
        <strong id="finalScore">0</strong>
      </p>
      <p class="arcade-gameover__sub" id="finalCorrects">0 respuestas correctas</p>
      <button class="libre-cta arcade-gameover__btn" id="reiniciarBtn">Jugar de nuevo</button>
      <button class="libre-cta arcade-gameover__btn arcade-gameover__btn--sec" id="volverBtn">Volver al inicio</button>
    </div>
  </div>

  <link rel="stylesheet" href="/static/css/progresion.css?v=8" />
  <script src="/static/js/progresion.js?v=9"></script>
  <script src="/static/js/arcade.js?v=6"></script>
  <script>
    var _paArcade = JSON.parse(localStorage.getItem('usuario') || '{}').puntos_totales || 0;
    (function poll() {
      if (!document.getElementById('arcadeGameover').hidden) {
        setTimeout(function() { mostrarProgreso(_paArcade, null); }, 1200);
      } else {
        setTimeout(poll, 300);
      }
    })();
  </script>
</body>
</html>
