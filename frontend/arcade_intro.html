<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor 11 — Arcade</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="stylesheet" href="/static/css/libre.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    .arcade-intro__icon {
      font-size: 7rem;
      line-height: 1;
      animation: flotar 2.8s ease-in-out infinite;
      display: block;
      text-align: center;
    }

    @keyframes flotar {
      0%, 100% { transform: translateY(0);    }
      50%       { transform: translateY(-12px); }
    }

    .arcade-intro__title {
      font-size: 2.4rem;
      font-weight: 800;
      color: var(--gray-900, #111827);
      text-align: center;
      margin: 12px 0 4px;
    }

    .arcade-intro__subtitle {
      font-size: 1rem;
      color: var(--gray-500, #6b7280);
      text-align: center;
      margin-bottom: 32px;
    }

    .arcade-intro__subtitle span {
      display: inline-block;
      opacity: 0;
      animation: aparecer .4s forwards;
    }

    @keyframes aparecer {
      to { opacity: 1; }
    }

    .arcade-intro__rules {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 340px;
      margin: 0 auto;
    }

    .arcade-intro__rule {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #fff7ed;
      border: 1.5px solid #fed7aa;
      border-radius: 16px;
      padding: 14px 18px;
      opacity: 0;
      transform: translateX(-24px);
      animation: slidein .4s forwards;
    }

    .arcade-intro__rule:nth-child(1) { animation-delay: .3s; }
    .arcade-intro__rule:nth-child(2) { animation-delay: .75s; }
    .arcade-intro__rule:nth-child(3) { animation-delay: 1.2s; }

    @keyframes slidein {
      to { opacity: 1; transform: translateX(0); }
    }

    .arcade-intro__rule-icon {
      font-size: 1.9rem;
      flex-shrink: 0;
    }

    .arcade-intro__rule-text {
      font-size: .93rem;
      font-weight: 600;
      color: #1c1917;
      line-height: 1.3;
    }

    .arcade-intro__rule-text span {
      display: block;
      font-weight: 400;
      color: #78716c;
      font-size: .83rem;
      margin-top: 2px;
    }

    .libre-intro__main {
      justify-content: center;
      gap: 0;
      padding: 28px 24px 0;
    }
  </style>
</head>
<body class="libre-body">

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="libre-header">
    <button class="libre-back" id="introBackBtn" aria-label="Volver">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1 class="libre-header__title">Arcade</h1>
    <button id="introMuteBtn" aria-label="Silenciar música" style="
      background:rgba(255,255,255,0.22);border:none;border-radius:50%;
      width:34px;height:34px;display:flex;align-items:center;justify-content:center;
      color:#fff;cursor:pointer;flex-shrink:0;">
      <svg id="introMuteIcon" xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
      </svg>
    </button>
  </header>

  <!-- ── Contenido principal ─────────────────────────────── -->
  <main class="libre-intro__main">
    <span class="arcade-intro__icon">🕹️</span>
    <h2 class="arcade-intro__title">Arcade</h2>
    <p class="arcade-intro__subtitle" id="arcadeSubtitulo">Pon a prueba todo lo que sabes</p>

    <div class="arcade-intro__rules">
      <div class="arcade-intro__rule">
        <span class="arcade-intro__rule-icon">♾️</span>
        <div class="arcade-intro__rule-text">
          Preguntas al azar
          <span>Responde preguntas de todas las materias sin parar</span>
        </div>
      </div>
      <div class="arcade-intro__rule">
        <span class="arcade-intro__rule-icon">❤️</span>
        <div class="arcade-intro__rule-text">
          3 vidas
          <span>Ten cuidado con cada error, por cada error pierdes una vida</span>
        </div>
      </div>
      <div class="arcade-intro__rule">
        <span class="arcade-intro__rule-icon">💀</span>
        <div class="arcade-intro__rule-text">
          Game Over
          <span>Si pierdes las 3 vidas, se acaba el juego</span>
        </div>
      </div>
    </div>
  </main>

  <!-- ── Botón inferior ──────────────────────────────────── -->
  <div class="libre-footer">
    <button class="libre-cta" id="btnJugar">¡Jugar!</button>
  </div>

  <script>
    const token = localStorage.getItem('access_token');
    if (!token) location.href = '/';

    // ── Sonidos ──────────────────────────────────────────────
    const sfxHover  = new Audio('/static/bloop.mp3');
    const sfxClick  = new Audio('/static/lib_audio.mp3');
    const sfxBack   = new Audio('/static/back_menu.mp3');
    const sfxMusica = new Audio('/static/arcade_musica.mp3');
    sfxHover.volume  = 0.5;
    sfxClick.volume  = 0.8;
    sfxBack.volume   = 0.8;
    sfxMusica.volume = 0.5;
    sfxMusica.loop   = true;
    sfxMusica.play().catch(() => {
      // Autoplay bloqueado: esperar interacción
      document.addEventListener('pointerdown', () => sfxMusica.play().catch(() => {}), { once: true });
    });

    // ── Subtítulo letra a letra ──────────────────────────────
    const sub   = document.getElementById('arcadeSubtitulo');
    const texto = sub.textContent;
    sub.textContent = '';
    [...texto].forEach((char, i) => {
      const sp = document.createElement('span');
      sp.textContent = char === ' ' ? '\u00A0' : char;
      sp.style.animationDelay = `${i * 0.04}s`;
      sub.appendChild(sp);
    });

    // ── Botón mute ───────────────────────────────────────────
    document.getElementById('introMuteBtn').addEventListener('click', () => {
      sfxMusica.muted = !sfxMusica.muted;
      sessionStorage.setItem('arcade_muted', sfxMusica.muted ? '1' : '0');
      const btn = document.getElementById('introMuteBtn');
      btn.style.opacity = sfxMusica.muted ? '0.45' : '1';
      document.getElementById('introMuteIcon').innerHTML = sfxMusica.muted
        ? `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
           <line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/>`
        : `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
           <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
           <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>`;
    });

    // ── Botón volver ─────────────────────────────────────────
    document.getElementById('introBackBtn').addEventListener('click', () => {
      sfxBack.currentTime = 0;
      sfxMusica.pause();
      sfxBack.onended = () => history.back();
      sfxBack.play().catch(() => history.back());
      setTimeout(() => history.back(), 600);
    });

    // ── Botón jugar ──────────────────────────────────────────
    const btnJugar = document.getElementById('btnJugar');
    btnJugar.addEventListener('mouseenter', () => {
      sfxHover.currentTime = 0;
      sfxHover.play().catch(() => {});
    });
    btnJugar.addEventListener('click', () => {
      sfxClick.currentTime = 0;
      sfxClick.onended = () => location.href = 'arcade.html';
      sfxClick.play().catch(() => location.href = 'arcade.html');
      setTimeout(() => location.href = 'arcade.html', 1200);
    });
  </script>
</body>
</html>
