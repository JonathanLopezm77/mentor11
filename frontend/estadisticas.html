<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor 11 — Estadísticas</title>
  <link rel="stylesheet" href="/static/css/styles.css?v=2" />
  <link rel="stylesheet" href="/static/css/estadisticas.css?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="stats-body">

  <div class="stats-page">

    <!-- ── Header ─────────────────────────────────────────── -->
    <header class="stats-header">
      <button class="stats-back-btn" id="backBtn" aria-label="Volver">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 18l-6-6 6-6"/>
        </svg>
      </button>
      <div class="stats-header-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
          <polyline points="2 17 6 13 10 17 18 9"/>
          <polyline points="15 9 18 9 18 12"/>
        </svg>
      </div>
    </header>

    <!-- ── Resumen ─────────────────────────────────────────── -->
    <div class="stats-summary-card">
      <span class="stats-summary-label">Resumen</span>
      <div class="stats-summary-pct" id="promedioGeneral">— %</div>
      <div class="stats-summary-sub">Promedio general</div>
    </div>

    <!-- ── Progreso por Materia ────────────────────────────── -->
    <div class="stats-section-title">Progreso por Materia</div>

    <div class="stats-subjects-card" id="subjectsCard">
      <p class="stats-loading" id="statsLoading">Cargando...</p>
    </div>

  </div>

  <!-- ── Nav inferior ───────────────────────────────────────── -->
  <nav class="stats-nav">
    <div class="stats-nav-pill">
      <button class="stats-nav-btn" id="navHome" aria-label="Inicio">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
          fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      </button>
      <button class="stats-nav-btn stats-nav-btn--active" aria-label="Estadísticas">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </button>
      <button class="stats-nav-btn" aria-label="Global">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
          fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.21 15.89A10 10 0 1 1 8 2.83"/>
          <path d="M22 12A10 10 0 0 0 12 2v10z"/>
        </svg>
      </button>
    </div>
  </nav>

  <script src="/static/js/estadisticas.js"></script>
</body>
</html>
