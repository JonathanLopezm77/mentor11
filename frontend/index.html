<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor 11 — Iniciar sesión</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="page">

    <!-- Decoración de fondo -->
    <div class="bg-shape bg-shape--top"></div>
    <div class="bg-shape bg-shape--bottom"></div>

    <main class="card">

      <!-- Espacio para el logo -->
      <div class="logo-wrapper">
        <div class="logo-circle">
          <img src="/static/img/logo.png" alt="Logo Mentor 11" />
        </div>
      </div>
      <!-- Encabezado -->
      <div class="card__header">
        <h1 class="card__title">Mentor 11</h1>
        <p class="card__subtitle">Prepárate para el ICFES Saber 11</p>
      </div>

      <!-- Formulario de login -->
      <form class="form" id="loginForm" novalidate>

        <div class="form__group">
          <label class="form__label" for="identifier">Usuario o correo</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input
              class="form__input"
              type="text"
              id="identifier"
              name="identifier"
              placeholder="tu_usuario o correo@mail.com"
              autocomplete="username"
              required
            />
          </div>
          <span class="form__error" id="identifierError"></span>
        </div>

        <div class="form__group">
          <label class="form__label" for="password">Contraseña</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input
              class="form__input"
              type="password"
              id="password"
              name="password"
              placeholder="Mínimo 8 caracteres"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form__error" id="passwordError"></span>
        </div>

        <!-- Alerta de error global -->
        <div class="alert alert--error" id="loginAlert" role="alert" hidden>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="loginAlertMsg"></span>
        </div>

        <button class="btn btn--primary" type="submit" id="submitBtn">
          <span class="btn__text">Iniciar sesión</span>
          <span class="btn__spinner" hidden>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
          </span>
        </button>

      </form>

      <p class="card__footer">
        ¿No tienes cuenta?
        <a href="registro.html" class="link">Regístrate gratis</a>
      </p>

    </main>

  </div>

  <script src="/static/js/app.js"></script>
</body>
</html>
