<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor 11 — Pregunta</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="stylesheet" href="/static/css/libre.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="libre-body">

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="libre-header">
    <button class="libre-back" aria-label="Volver">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1 class="libre-header__title">Libre</h1>
    <span class="libre-contador" id="contador">1 / 10</span>
  </header>

  <!-- ── Barra de progreso ───────────────────────────────── -->
  <div class="progreso-barra">
    <div class="progreso-barra__fill" id="progresoBarra" style="width: 0%"></div>
  </div>

  <!-- ── Contenido principal ─────────────────────────────── -->
  <main class="pregunta-main">

    <!-- Tarjeta con el enunciado -->
    <div class="pregunta-card">
      <p class="pregunta-enunciado" id="enunciado">Cargando pregunta...</p>
    </div>

    <!-- Grid de opciones de respuesta -->
    <div class="opciones-grid" id="opcionesGrid">
      <!-- Se llena dinámicamente -->
    </div>

    <!-- Explicación (aparece después de responder) -->
    <div class="pregunta-explicacion" id="explicacion" hidden></div>

  </main>

  <!-- ── Botón siguiente ─────────────────────────────────── -->
  <div class="libre-footer">
    <button class="libre-cta" id="siguienteBtn" hidden>Siguiente →</button>
  </div>

  <script src="/static/js/pregunta_libre.js?v=2"></script>
</body>
</html>
