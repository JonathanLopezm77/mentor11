<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentor 11 — Recuperar contraseña</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
    <div class="page">
        <div class="bg-shape bg-shape--top"></div>
        <div class="bg-shape bg-shape--bottom"></div>

        <main class="card">

            <div class="logo-wrapper">
                <div class="logo-circle">
                    <img src="/static/img/logo.png" alt="Logo Mentor 11" />
                </div>
            </div>

            <div class="card__header">
                <h1 class="card__title">¿Olvidaste tu contraseña?</h1>
                <p class="card__subtitle">Te enviaremos un enlace para restablecerla</p>
            </div>

            <form class="form" id="recuperarForm" novalidate>

                <div class="form__group">
                    <label class="form__label" for="email">Correo electrónico</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                                <polyline points="22,6 12,13 2,6" />
                            </svg>
                        </span>
                        <input class="form__input" type="email" id="email" name="email" placeholder="tu@correo.com"
                            autocomplete="email" required />
                    </div>
                    <span class="form__error" id="emailError"></span>
                </div>

                <div class="alert alert--error" id="recuperarAlert" role="alert" hidden>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <span id="recuperarAlertMsg"></span>
                </div>

                <div class="alert" id="recuperarOk" role="alert" hidden
                    style="background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    <span id="recuperarOkMsg"></span>
                </div>

                <button class="btn btn--primary" type="submit" id="submitBtn">
                    <span class="btn__text">Enviar enlace</span>
                    <span class="btn__spinner" hidden>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                        </svg>
                    </span>
                </button>

            </form>

            <p class="card__footer">
                <a href="/" class="link">← Volver al inicio de sesión</a>
            </p>

        </main>
    </div>

    <script>
        const form = document.getElementById('recuperarForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('.btn__text');
        const btnSpinner = submitBtn.querySelector('.btn__spinner');
        const alertEl = document.getElementById('recuperarAlert');
        const alertMsg = document.getElementById('recuperarAlertMsg');
        const okEl = document.getElementById('recuperarOk');
        const okMsg = document.getElementById('recuperarOkMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();

            if (!email) {
                document.getElementById('emailError').textContent = 'Ingresa tu correo';
                return;
            }

            submitBtn.disabled = true;
            btnText.hidden = true;
            btnSpinner.hidden = false;
            alertEl.hidden = true;
            okEl.hidden = true;

            try {
                const res = await fetch('/api/v1/auth/recuperar-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });

                const data = await res.json();

                if (res.ok) {
                    okMsg.textContent = data.mensaje;
                    okEl.hidden = false;
                    form.reset();
                } else {
                    alertMsg.textContent = data.detail || 'Error al procesar la solicitud';
                    alertEl.hidden = false;
                }
            } catch (_) {
                alertMsg.textContent = 'Error de conexión. Intenta de nuevo.';
                alertEl.hidden = false;
            } finally {
                submitBtn.disabled = false;
                btnText.hidden = false;
                btnSpinner.hidden = true;
            }
        });
    </script>
</body>

</html>
