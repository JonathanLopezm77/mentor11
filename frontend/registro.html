<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mentor 11 — Crear cuenta</title>
  <link rel="stylesheet" href="/static/css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="page">

    <div class="bg-shape bg-shape--top"></div>
    <div class="bg-shape bg-shape--bottom"></div>

    <main class="card">

      <!-- Logo -->
      <div class="logo-wrapper">
        <div class="logo-circle">
          <img src="/static/img/logo.png" alt="Logo Mentor 11" />
        </div>
      </div>

      <!-- Encabezado -->
      <div class="card__header">
        <h1 class="card__title">Crear cuenta</h1>
        <p class="card__subtitle">Únete y empieza a prepararte para el ICFES</p>
      </div>

      <!-- Formulario de registro -->
      <form class="form" id="registroForm" novalidate>

        <!-- Username -->
        <div class="form__group">
          <label class="form__label" for="username">Nombre de usuario</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input class="form__input" type="text" id="username" name="username"
              placeholder="min. 3 caracteres, sin espacios" autocomplete="username" required />
          </div>
          <span class="form__error" id="usernameError"></span>
        </div>

        <!-- Email -->
        <div class="form__group">
          <label class="form__label" for="email">Correo electrónico</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input class="form__input" type="email" id="email" name="email"
              placeholder="tu@correo.com" autocomplete="email" required />
          </div>
          <span class="form__error" id="emailError"></span>
        </div>

        <!-- Contraseña -->
        <div class="form__group">
          <label class="form__label" for="password">Contraseña</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input class="form__input" type="password" id="password" name="password"
              placeholder="Mínimo 8 caracteres" autocomplete="new-password" required />
            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="form__error" id="passwordError"></span>
        </div>

        <!-- Fecha de nacimiento -->
        <div class="form__group">
          <label class="form__label" for="fecha_nacimiento">Fecha de nacimiento <span class="form__optional">(opcional)</span></label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
              </svg>
            </span>
            <input class="form__input" type="date" id="fecha_nacimiento" name="fecha_nacimiento" />
          </div>
        </div>

        <!-- Rol -->
        <div class="form__group">
          <label class="form__label">Soy...</label>
          <div class="rol-selector">
            <label class="rol-option">
              <input type="radio" name="rol" value="estudiante" checked />
              <span class="rol-option__box">
                <span class="rol-option__icon">🎓</span>
                <span class="rol-option__label">Estudiante</span>
              </span>
            </label>
            <label class="rol-option">
              <input type="radio" name="rol" value="profesor" />
              <span class="rol-option__box">
                <span class="rol-option__icon">📚</span>
                <span class="rol-option__label">Profesor</span>
              </span>
            </label>
          </div>
        </div>

        <!-- Alerta de error global -->
        <div class="alert alert--error" id="registroAlert" role="alert" hidden>
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span id="registroAlertMsg"></span>
        </div>

        <button class="btn btn--primary" type="submit" id="submitBtn">
          <span class="btn__text">Crear cuenta</span>
          <span class="btn__spinner" hidden>
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
              fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
            </svg>
          </span>
        </button>

      </form>

      <p class="card__footer">
        ¿Ya tienes cuenta?
        <a href="/" class="link">Inicia sesión</a>
      </p>

    </main>
  </div>

  <script src="/static/js/registro.js"></script>
</body>
</html>
