<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mentor 11 — Nueva contraseña</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
    <div class="page">
        <div class="bg-shape bg-shape--top"></div>
        <div class="bg-shape bg-shape--bottom"></div>

        <main class="card">

            <div class="logo-wrapper">
                <div class="logo-circle">
                    <img src="/static/img/logo.png" alt="Logo Mentor 11" />
                </div>
            </div>

            <div class="card__header">
                <h1 class="card__title">Nueva contraseña</h1>
                <p class="card__subtitle">Elige una contraseña segura para tu cuenta</p>
            </div>

            <form class="form" id="resetForm" novalidate>

                <div class="form__group">
                    <label class="form__label" for="nueva">Nueva contraseña</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </span>
                        <input class="form__input" type="password" id="nueva" placeholder="Mínimo 8 caracteres"
                            required />
                        <button type="button" class="toggle-password" id="toggleNueva">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                    <span class="form__error" id="nuevaError"></span>
                </div>

                <div class="form__group">
                    <label class="form__label" for="confirmar">Confirmar contraseña</label>
                    <div class="input-wrapper">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                            </svg>
                        </span>
                        <input class="form__input" type="password" id="confirmar" placeholder="Repite la contraseña"
                            required />
                    </div>
                    <span class="form__error" id="confirmarError"></span>
                </div>

                <div class="alert alert--error" id="resetAlert" role="alert" hidden>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <span id="resetAlertMsg"></span>
                </div>

                <button class="btn btn--primary" type="submit" id="submitBtn">
                    <span class="btn__text">Guardar nueva contraseña</span>
                    <span class="btn__spinner" hidden>
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56" />
                        </svg>
                    </span>
                </button>

            </form>

            <p class="card__footer">
                <a href="/" class="link">← Volver al inicio de sesión</a>
            </p>

        </main>
    </div>

    <script>
        // Obtener token de la URL
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.querySelector('.card__subtitle').textContent =
                'Enlace inválido. Solicita uno nuevo.';
            document.getElementById('resetForm').hidden = true;
        }

        // Toggle mostrar/ocultar contraseña
        document.getElementById('toggleNueva').addEventListener('click', () => {
            const input = document.getElementById('nueva');
            input.type = input.type === 'password' ? 'text' : 'password';
        });

        const form = document.getElementById('resetForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = submitBtn.querySelector('.btn__text');
        const btnSpinner = submitBtn.querySelector('.btn__spinner');
        const alertEl = document.getElementById('resetAlert');
        const alertMsg = document.getElementById('resetAlertMsg');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const nueva = document.getElementById('nueva').value;
            const confirmar = document.getElementById('confirmar').value;

            document.getElementById('nuevaError').textContent = '';
            document.getElementById('confirmarError').textContent = '';
            alertEl.hidden = true;

            if (nueva.length < 8) {
                document.getElementById('nuevaError').textContent =
                    'La contraseña debe tener al menos 8 caracteres';
                return;
            }

            if (nueva !== confirmar) {
                document.getElementById('confirmarError').textContent =
                    'Las contraseñas no coinciden';
                return;
            }

            submitBtn.disabled = true;
            btnText.hidden = true;
            btnSpinner.hidden = false;

            try {
                const res = await fetch('/api/v1/auth/resetear-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token,
                        nueva_password: nueva,
                        confirmar_password: confirmar,
                    }),
                });

                const data = await res.json();

                if (res.ok) {
                    // Redirigir al login con mensaje de éxito
                    sessionStorage.setItem('reset_ok', '1');
                    location.href = '/';
                } else {
                    alertMsg.textContent = data.detail || 'Error al restablecer la contraseña';
                    alertEl.hidden = false;
                }
            } catch (_) {
                alertMsg.textContent = 'Error de conexión. Intenta de nuevo.';
                alertEl.hidden = false;
            } finally {
                submitBtn.disabled = false;
                btnText.hidden = false;
                btnSpinner.hidden = true;
            }
        });
    </script>
</body>

</html>
